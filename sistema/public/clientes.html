<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clientes — Oficina</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; }
        input, select { padding: 8px; margin: 5px; width: 200px; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        .btn-salvar { background: #f5a623; border: none; color: white; border-radius: 4px; }
        .btn-editar { background: #4a90d9; border: none; color: white; border-radius: 4px; }
        .btn-excluir { background: #d9534f; border: none; color: white; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f5a623; color: white; }
        #mensagem { margin-top: 10px; }
    </style>
</head>
<body>

<h2>Gerenciamento de Clientes</h2>
<a href="dashboard.html">← Voltar</a>

<h3 id="titulo-form">Cadastrar Cliente</h3>
<input type="hidden"  id="id_cliente">
<input type="text"   id="nome"      placeholder="Nome">
<input type="text"   id="documento" placeholder="CPF/CNPJ">
<button class="btn-salvar" onclick="salvar()">Salvar</button>
<button onclick="limpar()">Limpar</button>
<p id="mensagem"></p>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Documento</th>
            <th>Perfil</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody id="tabela"></tbody>
</table>

<script src="clientes.js"></script>
</body>
</html>
